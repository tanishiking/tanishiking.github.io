{{ define "main" }}
  <article class="container post-article">
    <header class="post-header reveal" style="--stagger: 0;">
      <h1>{{ .Title }}</h1>
      <p class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        {{ with .Params.author }}<span> · {{ . }}</span>{{ end }}
      </p>
      {{ with .Params.tags }}
        <ul class="tag-list" aria-label="Post tags">
          {{ range . }}<li>{{ . }}</li>{{ end }}
        </ul>
      {{ end }}
    </header>

    {{ if .TableOfContents }}
      <nav class="toc reveal" style="--stagger: 1;" aria-label="Table of contents">
        <p class="toc-title">Contents</p>
        {{ .TableOfContents }}
      </nav>
    {{ end }}

    <div class="markdown content reveal" style="--stagger: {{ if .TableOfContents }}2{{ else }}1{{ end }};">
      {{ .Content }}
    </div>
  </article>
{{ end }}
